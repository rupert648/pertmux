# pertmux configuration
# Copy to ~/.config/pertmux/pertmux.toml or pass via: pertmux -c ./config.toml

# How often (in seconds) to poll tmux panes and refresh the dashboard.
# refresh_interval = 2

# Agents are enabled by including their section below.
# Remove or comment out a section to disable that agent.
# If [agent] is omitted entirely, all agents are enabled with defaults.

[agent.opencode]
# db_path = "~/.local/share/opencode/opencode.db"

# TODO: implement claude
# [agent.claude_code]

# GitLab integration (optional — remove this section to disable GitLab features)
# When present, pertmux shows your open MRs and links them to local branches/worktrees/opencode.
# [gitlab]
# token = "glpat-xxxxxxxxxxxxxxxxxxxx"  # Or set PERTMUX_GITLAB_TOKEN env var
# host = "gitlab.com"                   # Default: gitlab.com
# project = "your-group/your-project"   # GitLab project path
# local_path = "/path/to/local/repo"    # Absolute path to local git repo
